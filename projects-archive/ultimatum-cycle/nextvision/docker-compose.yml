# NextVision Occupational Safety - Production Stack
# Occupational Safety AI Monitoring System for Factory Floor
# Target: Turkish factory pilot, 30 days @ $1
version: '3.9'

services:
  # PostgreSQL 16 - Production Database
  postgres:
    image: postgres:16-alpine
    container_name: nextvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextvision_db
      POSTGRES_USER: nextvision_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextvision_user -d nextvision_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextvision-network

  # Redis 7 - Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: nextvision-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextvision-network

  # MinIO - Object Storage (Video Storage)
  minio:
    image: minio/minio:latest
    container_name: nextvision-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - nextvision-network

  # YOLO Service - Computer Vision Detection
  yolo-service:
    build:
      context: ./src/services/yolo
      dockerfile: Dockerfile
    container_name: nextvision-yolo
    restart: unless-stopped
    runtime: nvidia  # For GPU acceleration on edge hardware
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - YOLO_MODEL_PATH=/models/yolov8n.pt
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://nextvision_user:${POSTGRES_PASSWORD}@postgres:5432/nextvision_db
    volumes:
      - ./models:/models:ro
      - /dev/shm:/dev/shm  # Shared memory for video processing
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nextvision-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # NextVision API - Main Application
  api:
    build:
      context: ./src/services/api
      dockerfile: Dockerfile
    container_name: nextvision-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://nextvision_user:${POSTGRES_PASSWORD}@postgres:5432/nextvision_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - YOLO_SERVICE_URL=http://yolo-service:8000
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      yolo-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nextvision-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nextvision-nginx
    restart: unless-stopped
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - api
    networks:
      - nextvision-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  nextvision-network:
    driver: bridge
